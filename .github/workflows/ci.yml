name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:
    inputs:
      greeting:
        description: Custom greeting message
        required: false
        default: Hello

permissions:
  contents: read

jobs:
  matrix-build:
    name: Build (version ${{ matrix.version }})
    runs-on: ubuntu-latest
    container: node:lts-alpine
    strategy:
      fail-fast: false
      matrix:
        version: ["1", "2"]
    steps:
      - name: Create dummy artifacts
        run: |
          mkdir -p dist
          echo "version=${{ matrix.version }}" > dist/output-${{ matrix.version }}.txt
          echo "sha=${{ github.sha }}" >> dist/output-${{ matrix.version }}.txt
          cat dist/output-${{ matrix.version }}.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-v${{ matrix.version }}
          path: dist/
          retention-days: 1

  call-nested:
    name: Call Nested Workflow
    needs: matrix-build
    uses: ./.github/workflows/reusable.yml
    with:
      message: "${{ inputs.greeting || 'Hello from CI' }} — run ${{ github.run_number }}"

  create-trx:
    name: Create and Upload TRX
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Create dummy TRX file
        run: |
          mkdir -p test-results
          cat > test-results/results.trx << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <TestRun id="00000000-0000-0000-0000-000000000001" name="Dummy Test Run" xmlns="http://microsoft.com/schemas/VisualStudio/TeamTest/2010">
            <Times creation="2024-01-01T00:00:00.0000000+00:00" queuing="2024-01-01T00:00:00.0000000+00:00" start="2024-01-01T00:00:00.0000000+00:00" finish="2024-01-01T00:00:01.0000000+00:00" />
            <TestDefinitions>
              <UnitTest name="DummyTest" id="00000000-0000-0000-0000-000000000002">
                <TestMethod className="DummyNamespace.DummyClass" name="DummyTest" />
              </UnitTest>
            </TestDefinitions>
            <Results>
              <UnitTestResult testId="00000000-0000-0000-0000-000000000002" testName="DummyTest" outcome="Passed" duration="00:00:00.001" />
            </Results>
            <ResultSummary outcome="Completed">
              <Counters total="1" executed="1" passed="1" failed="0" error="0" />
            </ResultSummary>
          </TestRun>
          EOF

      - name: Upload TRX artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-results-trx
          path: test-results/
          retention-days: 1

  post-nested:
    name: Post Nested
    needs: call-nested
    runs-on: ubuntu-latest
    container: node:lts-alpine
    permissions: {}
    steps:
      - name: Print nested result
        run: |
          echo "Nested workflow completed with result: ${{ needs.call-nested.outputs.result }}"
